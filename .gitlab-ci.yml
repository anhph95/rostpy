stages:
  - test
  - build
  - deploy

wheel:
  stage: build
  image: python:latest
  # make a docker daemon available for cibuildwheel to use
  services:
    - name: docker:dind
      entrypoint: ["env", "-u", "DOCKER_HOST"]
      command: ["dockerd-entrypoint.sh"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    # See https://github.com/docker-library/docker/pull/166
    DOCKER_TLS_CERTDIR: ""
  parallel:
    matrix:
      - CIBW_ARCH: 'x86_64'
        CIBW_BUILD:
          - 'cp310-manylinux_x86_64'
          - 'cp310-musllinux_x86_64'
          - 'cp311-manylinux_x86_64'
          - 'cp311-musllinux_x86_64'
          - 'cp312-manylinux_x86_64'
          - 'cp312-musllinux_x86_64'
          - 'cp313-manylinux_x86_64'
          - 'cp313-musllinux_x86_64'
          - 'cp314-manylinux_x86_64'
          - 'cp314-musllinux_x86_64'
  script:
    - curl -sSL https://get.docker.com/ | sh
    - python3 -m pip install cibuildwheel
    - python3 -m cibuildwheel --output-dir dist
  artifacts:
    paths:
      - dist

dist:
  stage: build
  image: python:latest
  script:
    - mkdir -p ~/.ssh && ssh-keyscan -t rsa gitlab.com >> ~/.ssh/known_hosts
    - git submodule update --init --recursive
    - python3 -m pip install build
    - python3 -m build --sdist --outdir dist
  artifacts:
    paths:
      - dist

test:
  stage: test
  image: thekevjames/nox:2022.1.7
  script:
    - apt update
    - apt install -y python3.10 python3.10-dev git cmake libboost-all-dev
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10
    - mkdir ~/.ssh && ssh-keyscan -t rsa gitlab.com >> ~/.ssh/known_hosts
    - git submodule update --init --recursive
    - nox

twine:
  stage: deploy
  image: python:latest
  environment: twine
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export
    - mkdir -p ~/.ssh && ssh-keyscan -t rsa gitlab.com >> ~/.ssh/known_hosts
    - git submodule update --init --recursive
    - python3 -m pip install build twine
    - python3 -m build --sdist --wheel --outdir dist
    - echo $TWINE_USERNAME
    - python3 -m twine upload dist/*
release_job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "running release_job"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'rostpy release $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'
