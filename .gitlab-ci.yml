stages:
  - build
  - test
  - deploy

wheel:
  stage: build
  image: python:latest
  # make a docker daemon available for cibuildwheel to use
  services:
    - name: docker:dind
      entrypoint: ["env", "-u", "DOCKER_HOST"]
      command: ["dockerd-entrypoint.sh"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    # See https://github.com/docker-library/docker/pull/166
    DOCKER_TLS_CERTDIR: ""
  script:
    - curl -sSL https://get.docker.com/ | sh
    - python3 -m pip install cibuildwheel
    - python3 -m cibuildwheel --output-dir wheels
  artifacts:
    paths:
      - wheels

dist:
  stage: build
  image: python:latest
  script:
    - python3 -m build --sdist --outdir dist
  artifacts:
    paths:
      - dist

test:
  stage: test
  when: on_success
  image: thekevjames/nox:2022.1.7
  script:
    - apt update
    - apt install -y python3.10 python3.10-dev python3.10-distutils git cmake
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10
    - nox  # you can also use tox

twine:
  stage: deploy
  image: python:latest
  when: manual
  script:
    - python3 -m pip install twine
    - python3 -m twine upload dist/ wheels/
