stages:
  - test
  - build
  - deploy

wheel:
  stage: build
  image: python:latest
  # make a docker daemon available for cibuildwheel to use
  services:
    - name: docker:dind
      entrypoint: ["env", "-u", "DOCKER_HOST"]
      command: ["dockerd-entrypoint.sh"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    # See https://github.com/docker-library/docker/pull/166
    DOCKER_TLS_CERTDIR: ""
  parallel:
    matrix:
      - CIBW_ARCH: 'x86_64'
        CIBW_BUILD:
          - 'cp38-manylinux_x86_64'
          - 'cp38-musllinux_x86_64'
          - 'cp39-manylinux_x86_64'
          - 'cp39-musllinux_x86_64'
          - 'cp310-manylinux_x86_64'
          - 'cp310-musllinux_x86_64'
          - 'cp311-manylinux_x86_64'
          - 'cp311-musllinux_x86_64'
        CIBW_MUSLLINUX_X86_64_IMAGE: 'musllinux_1_1'
        CIBW_MANYLINUX_X86_64_IMAGE: 'manylinux_2_17'
      - CIBW_ARCH: 'i686'
        CIBW_BUILD:
          - 'cp38-manylinux_i686'
          - 'cp38-musllinux_i686'
          - 'cp39-manylinux_i686'
          - 'cp39-musllinux_i686'
          - 'cp310-manylinux_i686'
          - 'cp310-musllinux_i686'
          - 'cp311-manylinux_i686'
          - 'cp311-musllinux_i686'
        CIBW_MUSLLINUX_I686_IMAGE: 'musllinux_1_1'
        CIBW_MANYLINUX_I686_IMAGE: 'manylinux_2_17'
  script:
    - curl -sSL https://get.docker.com/ | sh
    - python3 -m pip install cibuildwheel
    - python3 -m cibuildwheel --output-dir dist
  artifacts:
    paths:
      - dist

dist:
  stage: build
  image: python:latest
  script:
    - python3 -m pip install build
    - python3 -m build --sdist --outdir dist
  artifacts:
    paths:
      - dist

test:
  stage: test
  image: thekevjames/nox:2022.1.7
  script:
    - apt update
    - apt install -y python3.10 python3.10-dev python3.10-distutils git cmake libboost-all-dev
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10
    - mkdir ~/.ssh && ssh-keyscan -t rsa gitlab.com >> ~/.ssh/known_hosts
    - git submodule update --init
    - nox

twine:
  stage: deploy
  image: python:latest
  environment: twine
  variables:
    TWINE_USERNAME: '$TWINE_USERNAME'
    TWINE_PASSWORD: '$TWINE_PASSWORD'
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export
    - python3 -m pip install twine pybind11
    - python setup.py sdist
    - python3 -m twine upload -u $TWINE_USERNAME -p $TWINE_PASSWORD dist/*
release_job:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "running release_job"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'rostpy release $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'
